services:
  - type: web
    name: photo-storageapp
    runtime: ruby
    plan: free
    region: singapore
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec rails server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: photo-storageapp-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_SERVE_STATIC_FILES
        value: true
      - key: WEB_CONCURRENCY
        value: 2

databases:
  - name: photo-storageapp-db
    plan: free
    databaseName: photo_storageapp
    user: photo_storageapp
